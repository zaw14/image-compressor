<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="免费在线图片压缩工具，纯浏览器处理，不上传服务器，保护你的隐私。支持 JPG、PNG、WebP 格式批量压缩。">
<title>极速图片压缩 - 免费在线工具，不上传服务器</title>
<style>
/* ==================== 全局样式 ==================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0b0b14;
  --bg-secondary: #131324;
  --bg-card: rgba(22, 22, 45, 0.7);
  --border: rgba(255, 255, 255, 0.06);
  --text-primary: #e8e8f0;
  --text-secondary: #9898b0;
  --text-muted: #606078;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7);
  --success: #22c55e;
  --danger: #ef4444;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* 背景装饰 */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(99,102,241,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ==================== 布局 ==================== */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px 60px;
  position: relative;
  z-index: 1;
}

/* ==================== Header ==================== */
.header {
  text-align: center;
  margin-bottom: 48px;
}
.header .logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.header .logo svg { width: 36px; height: 36px; }
.header h1 {
  font-size: 2rem;
  font-weight: 700;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
.header p {
  color: var(--text-secondary);
  font-size: 0.95rem;
  margin-top: 8px;
}
.header .badge-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 500;
  background: rgba(99,102,241,0.1);
  color: var(--accent-hover);
  border: 1px solid rgba(99,102,241,0.2);
}
.badge.green {
  background: rgba(34,197,94,0.1);
  color: var(--success);
  border-color: rgba(34,197,94,0.2);
}

/* ==================== 上传区 ==================== */
.upload-zone {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 60px 30px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 24px;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(99,102,241,0.05);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(99,102,241,0.1);
}
.upload-zone.has-files {
  padding: 24px;
}
.upload-icon {
  width: 64px;
  height: 64px;
  margin: 0 auto 20px;
  background: rgba(99,102,241,0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform var(--transition);
}
.upload-zone:hover .upload-icon { transform: scale(1.05); }
.upload-zone h3 {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text-primary);
}
.upload-zone .hint {
  color: var(--text-muted);
  font-size: 0.85rem;
}
.upload-zone .formats {
  margin-top: 16px;
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}
.upload-zone .format-tag {
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 500;
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

/* ==================== 控制条 ==================== */
.controls {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 24px;
  display: none;
}
.controls.visible { display: block; }
.controls-row {
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.controls-row label {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}
.controls-row input[type="range"] {
  flex: 1;
  min-width: 150px;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.1);
  outline: none;
}
.controls-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent-gradient);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(99,102,241,0.4);
}
.controls-row .quality-value {
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--accent-hover);
  min-width: 42px;
  text-align: center;
}
.controls-row .format-select {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-size: 0.85rem;
  cursor: pointer;
  outline: none;
}
.controls-row .format-select:focus { border-color: var(--accent); }
.controls-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
}
.btn-primary {
  background: var(--accent-gradient);
  color: white;
  box-shadow: 0 4px 16px rgba(99,102,241,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.4); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary {
  background: rgba(255,255,255,0.06);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: rgba(255,255,255,0.1); }
.btn-danger {
  background: rgba(239,68,68,0.15);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.2);
}
.btn-danger:hover { background: rgba(239,68,68,0.25); }

/* ==================== 文件列表 ==================== */
.file-list { display: none; }
.file-list.visible { display: block; }
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.file-card {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all var(--transition);
}
.file-card:hover { border-color: rgba(99,102,241,0.3); }
.file-card .preview-img {
  width: 100%;
  height: 160px;
  object-fit: contain;
  background: rgba(0,0,0,0.3);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
}
.file-card .file-name {
  font-size: 0.85rem;
  font-weight: 500;
  word-break: break-all;
  margin-bottom: 10px;
  color: var(--text-primary);
}
.file-card .size-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.file-card .size-info .reduced {
  color: var(--success);
  font-weight: 600;
}
.file-card .progress-bar {
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.06);
  margin: 10px 0;
  overflow: hidden;
}
.file-card .progress-bar .fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent-gradient);
  transition: width 0.3s ease;
  width: 0%;
}
.file-card .card-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.file-card .card-actions .btn {
  flex: 1;
  padding: 8px 12px;
  font-size: 0.8rem;
  justify-content: center;
}

/* ==================== 全局操作 ==================== */
.global-actions {
  display: none;
  justify-content: center;
  gap: 12px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.global-actions.visible { display: flex; }

/* ==================== 状态提示 ==================== */
.status-toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 24px;
  font-size: 0.9rem;
  font-weight: 500;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.status-toast.show { opacity: 1; pointer-events: auto; }

/* ==================== 统计区 ==================== */
.stats {
  display: none;
  gap: 16px;
  margin-bottom: 24px;
}
.stats.visible {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}
.stat-card {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-align: center;
}
.stat-card .stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-card .stat-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ==================== Footer ==================== */
.footer {
  text-align: center;
  margin-top: 60px;
  padding-top: 30px;
  border-top: 1px solid var(--border);
}
.footer .contact {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.15);
  color: var(--accent-hover);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
}
.footer .contact:hover { background: rgba(99,102,241,0.15); }
.footer .copyright {
  color: var(--text-muted);
  font-size: 0.8rem;
  margin-top: 20px;
}
.footer .privacy-note {
  color: var(--text-muted);
  font-size: 0.75rem;
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

/* ==================== 响应式 ==================== */
@media (max-width: 640px) {
  .container { padding: 24px 12px 40px; }
  .header h1 { font-size: 1.5rem; }
  .upload-zone { padding: 40px 16px; }
  .file-grid { grid-template-columns: 1fr; }
  .controls-row { gap: 12px; }
}
</style>
</head>
<body>

<!-- 状态提示 -->
<div class="status-toast" id="toast"></div>

<div class="container">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <svg viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="url(#g)"/>
        <path d="M10 18l5-5 4 4 7-7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M21 10h5v5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="36" y2="36"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs>
      </svg>
    </div>
    <h1>极速图片压缩</h1>
    <p>纯浏览器处理 · 不上传服务器 · 保护你的隐私</p>
    <div class="badge-row">
      <span class="badge green">🔒 数据不上传</span>
      <span class="badge">⚡ 极速压缩</span>
      <span class="badge">📦 批量处理</span>
      <span class="badge">🆓 完全免费</span>
    </div>
  </header>

  <!-- 上传区 -->
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <h3>拖拽图片到此处，或点击上传</h3>
    <p class="hint">支持一次上传多张图片</p>
    <div class="formats">
      <span class="format-tag">JPG</span>
      <span class="format-tag">PNG</span>
      <span class="format-tag">WebP</span>
      <span class="format-tag">BMP</span>
      <span class="format-tag">GIF</span>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
  </div>

  <!-- 统计 -->
  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="stat-value" id="statCount">0</div>
      <div class="stat-label">文件数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statOriginal">0 KB</div>
      <div class="stat-label">原始大小</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statCompressed">0 KB</div>
      <div class="stat-label">压缩后</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statSaved">0%</div>
      <div class="stat-label">节省空间</div>
    </div>
  </div>

  <!-- 控制条 -->
  <div class="controls" id="controls">
    <div class="controls-row">
      <label>压缩质量</label>
      <input type="range" id="quality" min="10" max="100" value="75">
      <span class="quality-value" id="qualityLabel">75%</span>
      <label>输出格式</label>
      <select class="format-select" id="outputFormat">
        <option value="auto">保持原格式</option>
        <option value="image/jpeg">JPG</option>
        <option value="image/png">PNG</option>
        <option value="image/webp">WebP</option>
      </select>
    </div>
    <div class="controls-actions">
      <button class="btn btn-primary" id="compressAllBtn">🚀 全部压缩</button>
      <button class="btn btn-secondary" id="downloadAllBtn" disabled>📥 全部下载</button>
      <button class="btn btn-danger" id="clearBtn">🗑 清空</button>
    </div>
  </div>

  <!-- 文件列表 -->
  <div class="file-list" id="fileList">
    <div class="file-grid" id="fileGrid"></div>
  </div>

  <!-- 全局下载 -->
  <div class="global-actions" id="globalActions">
    <button class="btn btn-primary" id="downloadAllBtn2" disabled>📥 一键下载全部</button>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="privacy-note">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      所有图片在你自己的浏览器中处理，不会被上传到任何服务器，请放心使用
    </div>
    <p class="copyright">© 2026 极速图片压缩 · 免费在线工具</p>
  </footer>
</div>

<script>
// ==================== 核心逻辑 ====================
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileGrid = document.getElementById('fileGrid');
const fileList = document.getElementById('fileList');
const controls = document.getElementById('controls');
const stats = document.getElementById('stats');
const qualitySlider = document.getElementById('quality');
const qualityLabel = document.getElementById('qualityLabel');
const outputFormat = document.getElementById('outputFormat');
const compressAllBtn = document.getElementById('compressAllBtn');
const downloadAllBtn = document.getElementById('downloadAllBtn');
const downloadAllBtn2 = document.getElementById('downloadAllBtn2');
const clearBtn = document.getElementById('clearBtn');
const globalActions = document.getElementById('globalActions');
const toast = document.getElementById('toast');

let files = [];       // { file, compressedBlob, previewUrl, status }
let toastTimer;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

function formatSize(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  const v = (bytes / Math.pow(k, i)).toFixed(i === 0 ? 0 : 1);
  return v + ' ' + sizes[i];
}

function updateStats() {
  const total = files.length;
  let originalSize = 0, compressedSize = 0;
  files.forEach(f => {
    originalSize += f.file.size;
    if (f.compressedBlob) compressedSize += f.compressedBlob.size;
  });
  document.getElementById('statCount').textContent = total;
  document.getElementById('statOriginal').textContent = formatSize(originalSize);
  document.getElementById('statCompressed').textContent = compressedSize ? formatSize(compressedSize) : '—';
  const saved = originalSize > 0 && compressedSize > 0
    ? Math.round((1 - compressedSize / originalSize) * 100) : 0;
  document.getElementById('statSaved').textContent = saved ? saved + '%' : '—';

  stats.classList.toggle('visible', total > 0);
  controls.classList.toggle('visible', total > 0);
  fileList.classList.toggle('visible', total > 0);

  const anyCompressed = files.some(f => f.compressedBlob);
  downloadAllBtn.disabled = !anyCompressed;
  downloadAllBtn2.disabled = !anyCompressed;
  globalActions.classList.toggle('visible', anyCompressed);

  uploadZone.classList.toggle('has-files', total > 0);
}

function renderFiles() {
  fileGrid.innerHTML = files.map((f, i) => {
    const compressedSize = f.compressedBlob ? formatSize(f.compressedBlob.size) : '—';
    const saved = f.compressedBlob ? Math.round((1 - f.compressedBlob.size / f.file.size) * 100) : 0;
    const isDone = f.status === 'done';
    const isProcessing = f.status === 'processing';
    return `
      <div class="file-card">
        <img src="${f.previewUrl}" alt="${f.file.name}" class="preview-img" loading="lazy">
        <div class="file-name" title="${f.file.name}">${f.file.name}</div>
        <div class="size-info">
          <span>原始: ${formatSize(f.file.size)}</span>
          <span>压缩: ${compressedSize}</span>
        </div>
        ${saved > 0 ? `<div class="size-info"><span></span><span class="reduced">节省 ${saved}%</span></div>` : ''}
        ${isProcessing ? '<div class="progress-bar"><div class="fill" style="width:60%"></div></div>' : ''}
        <div class="card-actions">
          ${isDone
            ? `<button class="btn btn-primary" onclick="downloadOne(${i})">📥 下载</button>`
            : `<button class="btn btn-primary" onclick="compressOne(${i})">🚀 压缩</button>`
          }
          <button class="btn btn-danger" onclick="removeOne(${i})">✕</button>
        </div>
      </div>`;
  }).join('');
}

function addFiles(newFiles) {
  Array.from(newFiles).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const previewUrl = URL.createObjectURL(file);
    files.push({ file, compressedBlob: null, previewUrl, status: 'pending' });
  });
  renderFiles();
  updateStats();
  if (files.length > 0) showToast(`已添加 ${files.length} 个文件`);
}

async function compressOne(index) {
  const f = files[index];
  if (!f || f.status === 'processing') return;
  f.status = 'processing';
  renderFiles();

  try {
    const quality = parseInt(qualitySlider.value) / 100;
    const fmt = outputFormat.value === 'auto' ? f.file.type : outputFormat.value;

    const img = new Image();
    const url = URL.createObjectURL(f.file);
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      img.src = url;
    });
    URL.revokeObjectURL(url);

    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    const blob = await new Promise(resolve => canvas.toBlob(resolve, fmt, quality));
    f.compressedBlob = blob;
    f.status = 'done';
  } catch (err) {
    console.error('压缩失败:', f.file.name, err);
    f.status = 'pending';
    showToast('⚠️ ' + f.file.name + ' 压缩失败');
  }

  renderFiles();
  updateStats();
}

function downloadOne(index) {
  const f = files[index];
  if (!f || !f.compressedBlob) return;
  const extMap = {
    'image/jpeg': '.jpg',
    'image/png': '.png',
    'image/webp': '.webp',
  };
  const ext = extMap[f.compressedBlob.type] || '.jpg';
  const name = f.file.name.replace(/\.[^.]+$/, '') + '_compressed' + ext;
  const url = URL.createObjectURL(f.compressedBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 下载成功');
}

function removeOne(index) {
  const f = files[index];
  if (f.previewUrl) URL.revokeObjectURL(f.previewUrl);
  files.splice(index, 1);
  renderFiles();
  updateStats();
  if (files.length === 0) showToast('已清空');
}

async function compressAll() {
  const pending = files.filter(f => f.status === 'pending');
  if (pending.length === 0) {
    showToast('没有需要压缩的图片');
    return;
  }
  compressAllBtn.disabled = true;
  compressAllBtn.textContent = '⏳ 压缩中...';
  showToast(`正在压缩 ${pending.length} 张图片...`);

  for (let i = 0; i < files.length; i++) {
    if (files[i].status === 'pending') {
      await compressOne(i);
    }
  }

  compressAllBtn.disabled = false;
  compressAllBtn.textContent = '🚀 全部压缩';
  showToast('✅ 全部压缩完成！');
}

function downloadAll() {
  const done = files.filter(f => f.compressedBlob);
  if (done.length === 0) return;
  done.forEach((_, i) => {
    const idx = files.indexOf(done[i]);
    setTimeout(() => downloadOne(idx), i * 200);
  });
  showToast('📥 正在下载 ' + done.length + ' 个文件...');
}

function clearAll() {
  files.forEach(f => { if (f.previewUrl) URL.revokeObjectURL(f.previewUrl); });
  files = [];
  fileInput.value = '';
  renderFiles();
  updateStats();
  showToast('已清空全部文件');
}

// ==================== 事件绑定 ====================
uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => addFiles(e.target.files));

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});

qualitySlider.addEventListener('input', () => {
  qualityLabel.textContent = qualitySlider.value + '%';
});

compressAllBtn.addEventListener('click', compressAll);
downloadAllBtn.addEventListener('click', downloadAll);
downloadAllBtn2.addEventListener('click', downloadAll);
clearBtn.addEventListener('click', clearAll);

// 初始状态
updateStats();
</script>
</body>
</html>
